front:
  text: 洞明子撰
  hash: sha256:8357860989f99a31e2a35a1a65f4bf68f09576b8e2c62d95ea2546d5f683edde
  markers:
  - {type: head, offset: 0, content: 西雲集, id: KR5e0049_CK-KZ-jye_001-h1, level: 1}
body:
  text: 擺脫名韁利鎖囚歸來晦跡老林邱困時坐臥長松下拂拭莎茵枕石頭和氣氤氲滿洞天孕成靈質行功圓醉眠青嶂聞禽語喚出長生久視篇兀兀忘機出世籠飄飄雲水任西東醉來欹枕松陰下誰奏笙簧滿太空一片孤雲到處閑兩輪日月任循還道人手段能如是歸去埋名碧嶂間一溪緑水遶柴籬四面青山列翠微門外無他車馬客洞中時復野雲歸山堂終日沒來人靜夜時經虎撞門心性湛然居一闕化成和氣上崑崙碧嶂巖前與友期忻然談笑夜忘歸眼前不見紅塵境頂上白雲映月輝林泉養拙人情遠方寸無塵仙趣佳信步閑遊山與水歸來高枕臥烟霞靜夜興遊山色裏騰空撒手紫雲中妙高峰上猿啼月清淺溪邊虎嘯風十載身潛碧嶂間五雲堆裏自由閑閑人物外無人識南北東西自往還厭居塵世樂天眞物外逍遙散誕身深隱碧霞無伴侶高山流水作比鄰行少玄門未出羣得潜身處且潜身不求世上功名貴願作林泉守拙人洞天風月水和雲芝秀蓮開玉液醇昨夜青衣傳聖語都教分付與閑人豈倦人來到我齋恐人帶入是非來不爭談是談非理悟卻眞閒眞樂哉少年割斷攀縁網返照潛居老氏家散誕水雲爲活計清貧柔弱作生涯心念猶如水上漚迴光照破沒蹤由若人知此修行理和氣通身自運流不羨人間萬戸侯忘名棄利百無憂饑來隨分巡門乞飽後歸庵學解牛方寸無塵出世籠忘言得意本來空青山有石平如枕甘作人間打睡翁識破浮華利與名圓全性命行功成玎璫聒耳雲璈響跨鶴神遊上玉京紅塵堆裏眼慵開觸處無情性不埋雲破碧天秋月朗携笻獨步上瑤臺落魄閑遊自在仙困時高枕臥雲眠夢中一點塵無染化作金光滿大千玄妙機關總不推全身放下入無爲寂然應物眞空體便是男兒了悟時一眞悟徹萬縁休更不蹉跎逐意遊氣滿精盈功行具騎鯨歸去赴瀛洲放下全身道可親心灰不復染凡塵靈光上下通天地南北東西自在人死中又死死中死休了還休休了休鶴詔飛來三五次騎鸞纔縱九霄遊手提寶劍戰魔軍戰退魔軍作道民穩駕白牛遊洞府閑人渾似不閑人通天手段人難測出世機關鬼莫知蘂闕琳宮朝帝罷霓裳整頓宴瑤池心灰形槁罷干戈骨肉都飛上大羅俯視紅塵車馬客區區名利日奔波物外忘機合聖機天關撞透赴瑤池笛吹沒孔誰人解琴操無弦只自知觸境心休脫衆魔忘言得意罷干戈人間宛轉俱無盡只向庵中養太和清貧柔弱做眞修名利浮華事總休心地了然無別物清風明月滿瓊樓修行頓悟絕塵埃消散迷雲性月開煅煉洪濛歸我闕不移一步到蓬萊清光耿耿絕纖塵浩氣綿綿養谷神有事不如無事客無心維羨有心人和氣氤氲遍九垓蒼龍穩駕十洲來通明殿裏笙簧奏痛飲醍醐樂快哉昨夜騎龍狂道士專來共我話玄風丹成幾轉光明暗猶欠人間清淨功頭頭識破本來無浩浩清風滿太虛認得箇中眞面目便將形體作蘧廬頓捨浮囂絕世情忘機忘物更忘形神凝氣結嬰兒就縱去收來入窈冥心忘諸境出迷河意不沉空道行多雲散碧潭清皎潔靈光不昧氣神和竹几蒲團小草堂翛然無事且韜光從今更不閑吟咏免得教人話短長紅塵夢斷樂無休應物無生得自由神氣調和功行滿蒼鸞穩駕赴瀛洲從悟全眞沒一文一文不置是全眞怪來布被三冬暖分得壺中一半春嫉妬慳貪何日息氣財酒色幾時休回頭猛悟都抛卻撒手歸來儘自由百年光景四旬過一事無成兩鬢皤昨夜猛然心省悟寓居環堵養沖和因誦還丹九轉經十年醉夢一時驚無心世上爭頭角有意山間匿姓名遍遊南北與東西雲水行藏亦庶幾俗世生涯從擾聒仙家活計自幽微靜坐忘言自忖量前程進步入仙鄉仙鄉怎得教人見陰盡陽全道自彰靜坐忘言自忖量前程進步出塵疆丹田有寶超生滅方寸無情卽道鄉塵緣頓捨慕修仙性命圓融得自然觸境心灰無事客洞中高枕臥雲眠兩端善惡出無由一種塵心不肯休𢬵死十年爭鬥戰了時獨步太虛遊隱居青嶂暢情懷高臥雲烟樂快哉心意忽然塵世去神機猛省便迴來緑水青山絕點埃更於得處覓蓬萊茆庵草舍雖云陋無福誰人得到來回光勘破人情意返照觀開世態心世態人情心意盡不妨高枕臥瑤岑不趨富貴守貧閑爲甚教人冷眼看拂袖便歸青嶂裏騰身高臥白雲端功名富貴都抛卻世務人情總棄他直入雲山深處隱茆齋細細考玄科十分拙訥十分靜一味清貧一味閑金閣山深無客至一爐香火掩柴關憂患叢中憂患遠是非堆裏是非疏神機默識行藏理天上人間信不虛乾坤拍塞虎和龍掣電轟雷造化功天宇爛遊疏散客世人那有這家風自入玄門二十年收心不放馬猿顛歸來拍手巖前笑乾漢元來果是乾蓬頭垢面似憨癡內箇靈明不放輝直待青衣傳好語恁時方信悟玄機三緘人我是非情一念歸根道眼明從此出離因果界自歌自飲樂無生譬似無常限到頭爭如好向死前休休休休到無爲處方出俗流入道流奪得陰陽造化權便爲蓬島洞中仙蛟龍引向山頭臥猛虎牽來海底眠一聲鍾響夢魂驚三唱雞鳴出帝城獨步崑崙山頂上俯觀浮世利爭名神劍自從藏匣裏魔軍啾唧骨毛寒十方世界都遊遍一點靈明觸處安厯劫輪迴今日悟頭頭勘破出凡囚閑觀洪海峯前立偶遇靈槎天上遊佩劍騎龍氣勢雄翶翔適意遍蒼穹三山夜過天猶早就宿瑤臺第一峯一色青山聳碧空數聲幽鳥夕陽中鳥聲山色無人悟悟者還能造化通勘破諸縁出世間碧巖深處樂眞閑臥聆溪水潺潺響放眼西南更看山勘破人情世務虛飄蓬雲水寄天隅亂山深處藏茆屋更不人前美幻軀飽諳世務不牢堅遯迹林泉養浩然直待神丹成九轉倒騎玄鶴上三天不論天機與世機松間臥看白雲飛有人來問修行事笑指西峯冷翠徹臨頭境滅自心空和氣周流滿行功興卽縱吟青嶂裏倦時高臥白雲中四圍山色鎖殘陽一派泉聲遶草堂可笑世人心太濁卻於海上覓蓬莊雲山四面插穹蒼中有洞明道士堂好是暮春三月裏落花狼藉水流香金閣山藏一洞天古來招隱出塵賢一溪雲水環青嶂萬頃烟霞鎖翠巔時時刻刻悟重玄物物頭頭見本元不語語中機莫測無爲爲處理難言
