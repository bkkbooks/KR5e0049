front:
  text: 衷情不訴世情機適意閑吟得意詩有事爭如無事日無爲勝似有爲時
  hash: sha256:e74eddc0bef89941c2ae04919cfffdffdd9f386b827dfbf2d32e8af5ba001876
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0049_YP-C_18maoji-07-0062a, image: JY225/18maoji-07-0062a.png}
body:
  text: 戲作二首亭下長松四季春松邊無語立莎茵夜來行到河堤上柳絮隨風也撲人温凉寒暑四時安甘苦辛酸一味餐雖有是非來耳內並無榮辱到心間谷神物外忘機坦蕩身無中認得本來眞天關湧出歸蓬島此箇家風號谷神死心二首怎得羣情念不興追思羣念只心生我心解使生前死富國安民道自成修眞活計有何憑心死羣情念不生精氣沖盈功行具靈光照耀滿神京悟道四首師傳祕語悟心開物外家風物裏培走遍世間尋不得鳥從花裏帶將來忘機兀兀悟眞常法性堂堂滿大方鉛汞兩般收鼎內鎔成一片水晶光神仙元本在人修念斷形忘出世囚悟徹豆初無象物庵門不出到瀛洲祕語師傳悟本初來時無欠去無餘歷年塵垢揩磨盡遍體靈明耀太虛雲水跳出凡籠沒過愆飄飄雲水好因縁緑沙滿地松陰裏閑伴幽人一醉眠示眾二十首視聽忘懷心地靜悲歡絕念氣神和元初悟徹無來去這箇家風會得麽心休乍作無塵客頓悟重修又復修性似遙天秋月朗清虛影裏伴雲流緑鬢盡添新白髮區區名利兩無成直饒豪貴終何濟難買輪迴不死生周秦漢魏今何在虛幻功名總不堪肯繼古人張范輩隨吾歸去老雲龕是非總付無爭裏人我都歸忍辱中若更身心全放下靈光照耀滿蒼穹休將玄妙把人籠玄妙予觀也是空空跡頓除爲進火丹砂爐內自然紅日夜經營名利事朝昏整頓幻軀身直饒紫綬金章貴爭及無名閑道人生死途中人度歳輪迴路上客流年可憐錯把身心用不學長生久視仙休將幻體爲常體莫得談玄作又玄無象象中窮實相不言言處悟眞詮離情去欲眞男子逐利貪名不丈夫有象形骸爲糞土無名靈質本來軀除情減飯去陰魔睡少神清氣自和十二時中無暗昧三千功滿訪烟蘿人人有分做神仙只爲塵縁苦絆牽若把塵縁都放下便能平地步雲天可笑同流學道人迷頭認影作天眞修行不解忘言理畢竟難通象外身前程子細話叮嚀荆棘叢中着意行精進十年方事了自然九轉大丹成鉛汞兩般收鼎內鎔成一片水精光此端勝景休心得學者尤宜細審詳外辟陰魔內固陽此方方外更無方純陽煉就陰魔盡性命端能得久長四大凡軀不久長百年終是各分張心灰始悟眞空體玉韻琅琅滿大方邱劉妙理人難會譚馬機關世不傳此箇家風清淨得行人方可悟重玄閑人休作等閑猜散髮披襟養道才昨夜夢遊歸我闕神光變化滿瑤臺池淺風搖濁浪生淵深動處水波清修眞行淺心難定學道功深性易明誡梁先生遊訪三首請君休苦事奔波日用修行意若何善惡到頭全放下自然神定氣沖和善惡須知總幻縁未能超越豈爲賢身心放下還知否脫體全空象帝先眞仙欲慕斷攀縁性定方知命自全此理不須從外訪區區枉費草鞋錢示劉先生匠手當宜造作時爐中新火舊鉗鎚打成一段無名物絕像眞人更是誰述懷四首騰騰兀兀度平生得失無驚寵辱輕此理被誰還點破捨時卽退用時行靠水偎山構一窩溪田自種幾千科人皆笑我生涯事伎倆別無做甚麽避世慵夫伎倆無平生拙訥太愚疏不須更說人間事贏得安眠兩腳舒着我家風上畫幈瘦藤蓑笠草鞋輕人間厯遍渾無意一片孤雲野鶴情學道難千聞唯有出家難百計尋閑不得閑懊惱心機塵事染幾時歸去臥雲間答道友問修行休苦研窮說與君名韁擺脫自由人不居內外中間裏遍體虛無總法身答道友問妙教妙語玄言事若何其中消息本無多身心放下爲閑客不昧神清氣自和道友問如何超得陰陽造化新𠎝不造舊愆消新舊𠎝無神氣調煉出靈珠光燦爛陰陽造化卽時超眾道友問修行有何憑據修眞事有何憑據清淨行持知去處看取無生路上人境忘心滅蓬壺住友人問長安一回忍過一回閑境界臨時莫外干人惱自家心不動筭來只此是長安答問長生根塵盡處境幽清那裏人家沒死生有客若能行到此無名靈質太虛盈答人問煉汞鉛水飛雲逗上泥丸形槁心灰性自然只此便爲修煉術不須窮論汞和鉛贈楊福應楊氏全家敬上眞朝昏香火極殷勤今生受者前生積此世修完來世因贈李先生絕欲忘情心自刳蓬萊咫尺是前途勸君好把一來守悟徹元初一也無贈劉伯達二首心之所化性難量達者須知了大常若是渾身全放下浩然神氣滿穹蒼一篇拙語寄彭城百計無如守淨清興卽肆吟青嶂裏倦時高臥白雲京贈楊去華十年塵世訪眞賢惟遇弘農一老仙兩手頓開名利鎖一身沾得水雲天贈魯彥通二首俯視靈鼇戲黑波我來欲釣出迷河奈他不肯吞香餌回首空歸赴大羅名韁擺脫出塵才閑把絲綸上釣臺抛餌夜闌魚不食相邀風月洞中來贈蘇先生區區南北走紅塵笑殺長安路上人把似種冤靈府內爭如吟笑樂天眞與杜秀才二首虛心照破人間事實腹包含造化方應物眼前清淨界自然肘後有靈章天地中間任意遊逍遙落魄度春秋雖然未得長生趣境滅心忘死不憂寄王鷓舉太原苗裔志精專方寸無塵情命全廣度愚迷離世網驂隨同禮祖師前寄魯彥通着手掣開恩愛鎖翻身跳下是非臺亂山深處煙霞客竚聽松關扣便開魯彥通有出家之意無决烈之心二首丹田神水已枯乾鬢秃牙稀眼病殘來到寶山空手去前程咫尺受艱難日久年深識汝心口談玄理性貪淫淫情抛卻探玄理方許隨余住翠岑贈傅先生得失榮枯事盡諳歸來寄跡聚陽庵先生物外應難老常與迷人作指南贈在家學道二首幼稚修仙出俗籠猶然不悟本元容在家言了希夷理笑殺龐公與許公在欲難通出世機居塵不許慕希夷若憑口說成因果畫餅充齋怎濟饑贈銀郭進火不離爐竈邊丹成服卻悟重玄請君乞取玄中妙不動鈐鎚誠自然友人見訪世態紛華總不堪韜光晦迹臥煙嵐不因知友來相訪更有何人到此庵訪友人緑水青山作近鄰清風明月可相親饑餐飯罷無餘事閑步松巖謁故人友人以詩覓丹藥索和其韻休教一物到心間觸處無情覺性安牢固自家身內寶不須他處覓神丹別友人茅庵水遶竹籬邊仙友同居講妙玄別後何年相會遇駕雲朝禮祖師前李先生索賦二首莫問修行事若何羣魔戰退罷干戈天宫咫尺非遙遠方寸無塵卽大羅君還欲慕出塵才念斷人間絕往來象外家風休遠覓分明方寸有瑤臺贈人壽日不用莊椿壽贈賢聊將拙語對君傳殷勤牢固精神氣自得壺中日月延劉節使壽含淳抱樸人皆望政事文章世共傳君壽不須山野祝壺中日月自綿綿弔傅先生身在玄門三十年無心跳出五行邊而今擎下皮囊去卻返從來象外天宋老羽化勘破般般業漸消忘機兀兀氣神調早年了卻長生事免向人間受寂寥次魯彥通韻二首割斷從前名利韁靈光發泄滿寥陽方知物外家風好不復神魂夢在鄕敲開利鎖脫塵韁雲水參師遇正陽洞府仙人爲伴侣已知別卻死生鄕次讓庵主韻二首自心有病自心看行住相隨坐臥閑千種愛縁都割斷輪迴免卻在人間綠水青山不厭看此身渾似白雲閑閑中更有些兒事恍惚神遊閬苑間次孫先生韻
