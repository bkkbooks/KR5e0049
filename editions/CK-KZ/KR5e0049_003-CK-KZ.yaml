seq: 3
front:
  text: 茆庵水繞竹籬邊仙友同居講妙玄猿馬見前牢固鎻自然肘後有靈篇
  hash: sha256:595fe1e7d54c93d02be6ec2dd787395006fbfa6aa5692db466c3420fa6cbde60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0049_CK-KZ_01p072a, image: JY225/CK-KZ_JY225_01p072a.png}
body:
  text: 次高教授韻清淨始知塵外境無爲方免死生催人間萬事都抛卻笑指雲山歸去來太平劉大師索和其韻九首勸君日夜細思量絕盡諸縁沒禍殃斡轉玄關離世網同歸蓬島禮重陽修行別沒妙和玄守一忘形絕愛縁對境無心眞了了倒騎白鹿上瑤天萬里無雲萬里夭心休不論妙和玄靈臺澄徹眞空體應物猶如寶鑑懸白雲斷處見青天黑霧收時性月圓此理若人還會得虛無妙體自周全天道盈虛日月旋人心無垢亦如然醍醐半飲昇宵漢玉韻聲喧慶大年浮囂捨盡道窮研物我俱忘始悟玄撒手長空清淨體光輝直過斗牛邊圖榮畢竟終防辱謀假情知卻喪眞此箇機關還會得了無縈繫度殘春晝夜磨刀學解牛朝昏齊物慕眞修眼前黑霧俱收盡肘後金精自運流不在毫端與舌端只憑眞實行功圓十年行到無心處一段靈明屬自然次元宣差韻二首能除假事曰傷眞眞假俱除境不侵道骨煉成簫瑟奏流霞慶飲醉瓊林陰陽擣碎安爐裏進火輕輕滚更煎大忌是非財色染服之箇箇定延年次高教授韻仙風悟徹浄功成垢面從人不眼輕心地盡除無別物窮神惟有道資生次李參議韻四首吾齋瓊液滿壺杯盈眼碧桃花正開特下山堂邀勝友奈何不果獨歸來雲州勝槩追尋遍金閣山中景最多流水一溪清浩蕩危峯四面碧嵯峨幼稚離家遠世塵煙霞堆裏樂天眞雖然未得神仙去且與青山作主人歸隱林泉考太玄收心不放馬猿顛紛紛俗事渾無著浩浩神光滿洞天次傅先生韻四首浮世功名絕意研退藏高枕臥雲煙無邊閑境都歸我明月清風不用錢覺來懶把利名攀雲水生涯自在閑體性湛然歸洞府頓然無慮到人間事事諳來總不成退藏高臥白雲京三光慧照羣魔散一念無生出五行有心卽究無心體無事爲玄有是非但願此言人早省歸來下手亦遲遲重陽霜落吳江楓葉香籬邊滿意菊花黃幾時得見淵明老共對西風笑一場中秋更深雲退倍風清皎潔蟾光分外明有意醉吟同眾賞飛仙邀去翫神京重九二首三徑黃花艷夕陽滿林紅葉醉秋霜掛冠歸去平生樂不羨參軍落帽狂好是重陽逍息近飄飄紅葉弄西風西風紅葉無人悟悟者還通造化功春雨童子傳宣下玉京蛟龍出海駕雲行乾坤便降清凉雨滋長黃芽滿地生喜雨久旱民荒禱聖祇蛟龍出海駕雲霓甘膏大降農夫興頂笠披簑帶雨犁聞杜鵑金閣山前杜宇啼一聲聲道不如歸遊人誰識眞歸趣始悟寰中達者稀壬子歲居雲州樂全庵夏至後五日急雪滿空離地丈餘化而成雨二首半隨烟靄半隨風天上飛來地上融如似雲溪閑道士養成元氣滿虛中暑氣醺人午睡濃覺來六出滿空凝陰陽造化知顛倒一片靈臺冷似冰寒江獨釣一片煙蓑一葉舟爭如袖手去來休情知月白風清夜那箇魚兒肯上鈎酴醿一架酴醾花正開幽人無語自徘徊昔年春去方歸去今歲春來又復來白雲仙人招隱大隱不須巖下去城居亦可慕眞修和光混俗還知否形槁心灰性自由愚齋二儀靉昧難分處一氣洪濛未判時回也不違參也魯此情惟有聖人知題紙扇咫尺仙鄕路不長靈臺無垢悟眞常三焦暑氣穿腸熱一舉清風透骨凉題龍門九龍觀龍門晝夜水潺潺霧鎖煙籠沒淺山碧洞深藏無限景孰知蓬島在人間題臨潼華清宫陰去陽還體自然雲山深隱洞中天經今幾度桑田變鼎內丹砂依舊煎題聚陽山明眞觀明眞觀後聚陽山翠聳羣峰碧漢間內隱許多無事客白雲堆裏自由閒丁巳秋日過縉邊夢裏歸心到廣寒覺來依舊客塵寰西風一夜掀簾急吹綻黃花滿曲欄至元癸酉同奉御史公奉旨降香嶽瀆過濟南驛馬駸駸出帝京水光山色動吟情山源水谷無窮處絕慮忘思卻自明泰山二首石磴初登怯路難漸昇雲表覺心安天風披拂來何遠身世渾疑到廣寒三月中旬謁泰山山行爽氣逼人寒爲觀日出峯頭立俯瞰塵寰眼界寬天壇飄飄風袖謁仙壇壇上無人獨往還玉夜滿斟時自飲笙簧誰奏碧霄間投龍簡二首皇都別後到天壇壇上焚香祝萬安喜遇仙燈昭瑞應不防良夜倚欄看親承君命下丹墀度水穿林入翠微王母洞投龍簡日翩翩鶴伴彩雲飛同引進崔公叔文過洞庭湖水澄風細瑞煙清敬爇名香禱聖明拙句偶成聊遣興洞庭書壁記曾行題祝融峯世務人情不足看歸來晦跡掩松關孤高絕頂無人到獨駕蒼龍任往還題居庸關二首半年幾過居庸關誰信閑人卻不閑白髮垂垂成底事青山依舊水潺潺松風啼鳥送人歸小雨初晴路不泥說與居庸關上客長春指日到無疑龍門秋來兩度過龍門頂踵無非荷聖恩足躡黃雲歸故國手提滄海上崑崙蓬山人間別後到蓬山從此人間更不還茆舍竹籬青嶂底悠然相對白雲閑過輝州竹杖芒鞋短布裘飄蓬雲水過輝州催詩風雨無佳句貪看蛟龍戲碧流濟源投簡琳宫醮罷承天語龍簡齎來水府投符瑞暮冬和氣盛靈龜蕩漾戲清流投簡敬持龍簡出皇州濟瀆嵩巖兩處投天爲聖明恢壽域青山無盡水長流嵩山次引進崔叔文韻使星羽客喜同遊和氣溶溶瑞氣浮無限好山迎馬首一峯還秀一峯幽九月宿秋陽觀值雨雨過黃花分外香風吹紅葉送秋忙山禽不語情尤遠野草無名理更長華嶽恰睡泉聲喚覺人風前月下訪天眞騰身直上南峰頂返照迴光看北辰過井陘二首策馬凌晨過井陘崎嶇長路動吟情此行若被雞聲管屢破遊仙夢不成衮衮寒雲馬足生馬頭迎翠亂山橫雲山好景無佳句貪聽猿啼虎嘯聲題隱泉山勢迴環枕涌泉洞門高啟出雲煙挽回世態紛華境占得人間一洞天自述渴飲醍醐天地髓饑餐餚饌虎龍肌這些受用閑人事不是閑人未易知余疇昔甚愛河中永樂純陽宫之西地勢極佳嘗擬改葬先師披雲眞人未决忽一日靜中見先師過門急從之已失所在遂得一絕云不覺不知可便歸明明白白也宜時兩端事理從君用遠近無爲無不爲答人問修行二首略將管見對君陳師授玄言悟本眞雖是未能全了達無心再作養蒙人心生種種塵縁起意滅頭頭合聖機若是人能知此理不移一步到瑤池長春宫方壺述懷二首曲欄幽圃景非常松檜森森下夕陽瓊液釀來和月飲玉簪風送滿庭香擬將滄海爲佳釀旋解葫瓢作巨杯尊老敬邀連夜飲松風竹月喜相陪蓬山上庵四首十載山居遠世情年來似覺夢魂輕夜深無寐欣然坐明月滿堂風更清三面危峰列翠屏巖深樹老瑞雲橫我來意欲忘歸計爭奈功虧行未成院內黃花四季開雲山水竹遶樓臺休言好景無人到風月不邀時自來倚山臨水建茆齋門對青松影裏開咫尺洞天人不到白雲幽鳥去還來題中嶽嵩山翠屏玉柱與金壺歷遍諸峯總不如芝草蕙蘭香滿院水光山色遶茅廬孝子忠順堅持忘世態居喪謹守棄浮華人間孝子知多少似此精誠肖幾家題峯山蕪臺見一亭二首蕪臺見一臨清溪錦樹屏山四面圍一段煙霞人跡靜携笻獨步看雲飛黃精蒼术爲佳釀瓦鉢磁甌代玉杯特下蕪臺邀故友奈何不果獨歸來示眾南北東西總一天其中理趣得眞傳萬機不向心頭掛一段靈明屬自然至元癸巳夏四月祕書監丞張君玉被旨論山野作祠事以老拙危病不果故作是詩以謝喜遇知音話本因門風敢不盡心陳自慚濟世無才略只與青山作主人題白雲庵重陽佳節人爭賞蔾杖長拖與眾遊仙舘問云居甚處白雲庵近白雲樓歸金閣山舊隱老來林下度殘年憶得先人詩一聯寬著吉心消白日靜開道眼看青天贈瓦匠青白玎璫四角平依長闊厚兩無爭如生破壞歸元主故作荒詩爲准憑遺世二首萬事從今總不干十年瀟灑隱林巒三千功滿朝元去半夜騎龍到廣寒和氣周流正性開煉神合道出塵埃騰空撒手乘風去回首人間不再來
